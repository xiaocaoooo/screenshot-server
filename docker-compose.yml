services:
  screenshot-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: xiaocaoooo/screenshot-server:local
    container_name: screenshot-server
    ports:
      - "8080:8080"
    environment:
      PORT: "3000"
      # 默认 browserless 端口为 3000 host.docker.internal
      BROWSERLESS_HTTP_URL: "http://host.docker.internal:3000"
      # 可选：直接给 WS（优先级更高）
      # CHROME_WS_ENDPOINT: "ws://host.docker.internal:3000/devtools/browser/<id>"
    restart: unless-stopped
